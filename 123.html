<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAGO | ULTRA GREEN GLITCH</title>
    <style>
        :root {
            --bg-main: #001a0a; /* 어두운 초록 배경 */
            --bg-secondary: #002b12;
            --accent: #2ecc71; /* 네온 초록 */
            --danger: #ff4d4d;
            --text-main: #2ecc71;
            --text-sub: #1e8449;
            --border: #1e8449;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); overflow: hidden; }

        /* Navigation */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(0, 26, 10, 0.9);
            backdrop-filter: blur(20px); border-bottom: 2px solid var(--accent);
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 24px; cursor: pointer; letter-spacing: -1.5px; color: var(--accent); }
        .logo span { background: var(--accent); color: var(--bg-main); font-size: 10px; padding: 2px 4px; margin-left: 5px; border-radius: 4px; }
        
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a { text-decoration: none; color: var(--text-sub); font-weight: 600; cursor: pointer; font-size: 14px; transition: var(--transition); }
        nav ul li a:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .btn-green { background: var(--accent); color: var(--bg-main); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: var(--transition); box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
        .btn-green:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(46, 204, 113, 0.6); }

        /* Page Management */
        .page { display: none; padding-top: 70px; height: 100vh; }
        .page.active { display: block; }

        /* EDITOR LAYOUT */
        .editor-layout { display: flex; height: calc(100vh - 70px); background: var(--bg-secondary); }
        .sidebar { width: 100px; background: var(--bg-main); border-right: 2px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 20px; }
        
        .tool-btn { border: none; background: none; cursor: pointer; text-align: center; font-size: 11px; font-weight: 700; color: var(--text-sub); width: 100%; transition: var(--transition); }
        .tool-icon { width: 52px; height: 52px; border: 2px solid var(--border); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 20px; color: var(--accent); transition: var(--transition); }
        .tool-btn:hover .tool-icon { background: var(--accent); color: var(--bg-main); box-shadow: 0 0 20px var(--accent); }
        
        .tool-btn.del-btn .tool-icon { color: var(--danger); border-color: var(--danger); }
        .tool-btn.del-btn:hover .tool-icon { background: var(--danger); color: white; box-shadow: 0 0 20px var(--danger); }

        /* Canvas Area */
        .canvas-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 40px; }
        .artboard { 
            width: 450px; height: 600px; background: #003d1a; position: relative; 
            box-shadow: 0 0 100px rgba(46, 204, 113, 0.2); border-radius: 4px; overflow: hidden; 
            border: 3px solid var(--accent);
        }
        
        .element { position: absolute; cursor: move; user-select: none; border: 2px solid transparent; will-change: transform, top, left; }
        .element.selected { border: 2px solid white !important; z-index: 1000; box-shadow: 0 0 15px var(--accent); }
        
        .text-el { min-width: 50px; font-size: 30px; font-weight: 900; white-space: nowrap; padding: 10px; outline: none; color: var(--accent); text-shadow: 0 0 5px rgba(46, 204, 113, 0.5); }
        .box-el { width: 120px; height: 120px; background: var(--accent); }
        .circle-el { width: 120px; height: 120px; background: var(--accent); border-radius: 50%; }

        .editor-top-bar { 
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 24px; background: rgba(0, 43, 18, 0.9); 
            backdrop-filter: blur(15px); padding: 12px 32px; border-radius: 50px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 500; 
            align-items: center; border: 2px solid var(--accent); 
        }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .control-group label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .editor-top-bar input { border: 1px solid var(--border); padding: 6px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; background: var(--bg-main); color: var(--accent); }

        /* Toast */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: var(--bg-main); padding: 12px 24px; border-radius: 30px;
            font-size: 14px; font-weight: 900; z-index: 3000; display: none;
            box-shadow: 0 0 30px var(--accent);
        }

        /* Glitch Animation */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: rgba(46, 204, 113, 0.1); pointer-events: none; animation: scanline 4s linear infinite; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="navTo('home-page')">LAGO<span>GREEN GLITCH</span></div>
        <nav>
            <ul>
                <li><a onclick="navTo('home-page')">Home</a></li>
                <li><a onclick="navTo('editor-page')">Studio</a></li>
            </ul>
        </nav>
        <button class="btn-green" onclick="navTo('editor-page')">ENTER THE VOID</button>
    </header>

    <div id="home-page" class="page active">
        <div class="scanline"></div>
        <div style="text-align: center; padding-top: 15vh;">
            <h1 style="font-size: 7rem; font-weight: 950; letter-spacing: -8px; line-height: 0.9; color: var(--accent); text-shadow: 0 0 30px var(--accent);">GREEN<br>OVERLOAD.</h1>
            <p style="color: var(--accent); font-size: 1.5rem; margin-top: 20px; opacity: 0.8;">EVERYTHING IS GREEN. EVERYTHING IS FALLING.</p>
            <button class="btn-green" style="margin-top: 50px; padding: 25px 60px; border-radius: 50px; font-size: 1.2rem;" onclick="navTo('editor-page')">START GLITCHING</button>
        </div>
    </div>

    <div id="editor-page" class="page">
        <div class="editor-layout">
            <aside class="sidebar">
                <button class="tool-btn" onclick="addElement('text')"><div class="tool-icon">T</div>Text</button>
                <button class="tool-btn" onclick="addElement('box')"><div class="tool-icon">■</div>Box</button>
                <button class="tool-btn" onclick="addElement('circle')"><div class="tool-icon">●</div>Circle</button>
                <div style="flex: 1;"></div>
                <button class="tool-btn del-btn" onclick="deleteElement()"><div class="tool-icon">✕</div>Delete</button>
            </aside>
            <main class="canvas-container">
                <div class="editor-top-bar">
                    <div class="control-group">
                        <label>GREEN INDEX</label>
                        <input type="range" min="0" max="100" value="100">
                    </div>
                    <div class="control-group">
                        <label>SIZE</label>
                        <input type="number" id="prop-size" style="width: 70px;" oninput="updateElement('size', this.value)">
                    </div>
                    <button class="btn-green" style="padding: 10px 24px; font-size: 12px; border-radius: 20px;" onclick="exportImage()">REBOOT SYSTEM</button>
                </div>
                <div class="artboard" id="artboard" onclick="deselectAll(event)">
                    <div class="scanline"></div>
                    <div class="element text-el selected" style="left: 100px; top: 50px; z-index: 100;" onmousedown="startDrag(this, event)">SYSTEM INFECTED</div>
                </div>
            </main>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let selectedEl = null;
        let isDragging = false;
        let offset = { x: 0, y: 0 };
        
        const elements = [];
        const GRAVITY = 0.6;
        const BOUNCE = -0.5;
        const ARTBOARD_HEIGHT = 600;

        function updatePhysics() {
            elements.forEach(elObj => {
                if (elObj.el === selectedEl && isDragging) return;

                elObj.vy += elObj.gravityDir * GRAVITY;
                elObj.y += elObj.vy;

                const elHeight = elObj.el.offsetHeight;
                if (elObj.y + elHeight > ARTBOARD_HEIGHT) {
                    elObj.y = ARTBOARD_HEIGHT - elHeight;
                    elObj.vy *= BOUNCE;
                    if(Math.abs(elObj.vy) < 1) elObj.vy = 0;
                }

                if (elObj.y < -300) {
                    elObj.y = ARTBOARD_HEIGHT;
                    elObj.vy = -10;
                    showToast("ERROR: 요소가 대기권을 돌파했습니다!");
                }

                elObj.el.style.top = elObj.y + "px";
                elObj.el.style.left = elObj.x + "px";
            });
            requestAnimationFrame(updatePhysics);
        }

        window.navTo = function(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        };

        window.startDrag = function(el, e) {
            if(e.target.isContentEditable && document.activeElement === e.target) return;
            e.stopPropagation();
            select(el);
            isDragging = true;
            offset = { x: e.clientX - el.offsetLeft, y: e.clientY - el.offsetTop };
            
            const elObj = elements.find(o => o.el === el);
            if(elObj) { elObj.vy = 0; }

            const moveHandler = (e) => {
                if (!isDragging) return;
                const newX = e.clientX - offset.x;
                const newY = e.clientY - offset.y;
                el.style.left = newX + 'px';
                el.style.top = newY + 'px';
                if(elObj) { elObj.x = newX; elObj.y = newY; }
            };
            
            const upHandler = () => {
                isDragging = false;
                if(elObj && Math.random() < 0.2) {
                    elObj.gravityDir = -1;
                    showToast("WARNING: 중력 역전 발생!");
                } else if(elObj) {
                    elObj.gravityDir = 1;
                }
                window.removeEventListener('mousemove', moveHandler);
                window.removeEventListener('mouseup', upHandler);
            };
            
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('mouseup', upHandler);
        };

        function select(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el;
            selectedEl.classList.add('selected');
            const style = window.getComputedStyle(el);
            document.getElementById('prop-size').value = parseInt(el.classList.contains('text-el') ? style.fontSize : style.width);
        }

        window.deselectAll = function(e) {
            if (e.target.id === 'artboard' && selectedEl) {
                selectedEl.classList.remove('selected');
                selectedEl = null;
            }
        };

        window.addElement = function(type) {
            const artboard = document.getElementById('artboard');
            const el = document.createElement('div');
            el.className = `element ${type}-el`;
            
            // 모든 요소를 초록색으로 강제
            if(type === 'text') { 
                el.innerText = "PURE GREEN"; 
                el.contentEditable = true; 
                el.style.fontSize = "32px"; 
                el.style.color = "#2ecc71";
            } else {
                el.style.backgroundColor = "#2ecc71";
            }

            el.style.left = "150px"; 
            el.style.top = "50px";
            el.onmousedown = (e) => window.startDrag(el, e);
            artboard.appendChild(el);
            
            elements.push({ el, x: 150, y: 50, vy: 0, gravityDir: 1 });
            select(el);
            showToast("초록색 데이터 조각 생성됨.");
        };

        window.updateElement = function(type, val) {
            if (!selectedEl) return;
            if (type === 'size') {
                if (selectedEl.classList.contains('text-el')) selectedEl.style.fontSize = val + 'px';
                else { selectedEl.style.width = val + 'px'; selectedEl.style.height = val + 'px'; }
            }
        };

        window.deleteElement = function() {
            if (selectedEl) { 
                const idx = elements.findIndex(o => o.el === selectedEl);
                if(idx > -1) elements.splice(idx, 1);
                selectedEl.remove(); 
                selectedEl = null; 
                showToast("데이터 소거 완료."); 
            }
        };

        window.exportImage = function() {
            showToast("CRITICAL ERROR: 시스템이 너무 초록색이라 불가능합니다.");
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        window.onload = () => {
            const initialEl = document.querySelector('.element');
            if(initialEl) {
                initialEl.onmousedown = (e) => window.startDrag(initialEl, e);
                elements.push({ el: initialEl, x: 100, y: 50, vy: 0, gravityDir: 1 });
            }
            updatePhysics();
            setTimeout(() => showToast("WELCOME TO GREEN HELL 🧪"), 1000);
        };
    </script>
</body>
</html>
