<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAGO | Studio v2.1</title>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-secondary: #f8f9fa;
            --accent: #007aff;
            --danger: #ff4d4d;
            --text-main: #111111;
            --text-sub: #888888;
            --border: #eeeeee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); overflow: hidden; }

        /* Navigation */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 24px; cursor: pointer; letter-spacing: -1.5px; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a { text-decoration: none; color: var(--text-sub); font-weight: 600; cursor: pointer; font-size: 14px; }

        .btn-black { background: #111; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-black:hover { opacity: 0.8; }

        /* Page Management */
        .page { display: none; padding-top: 70px; height: 100vh; }
        .page.active { display: block; }

        /* EDITOR LAYOUT */
        .editor-layout { display: flex; height: calc(100vh - 70px); background: #f0f0f2; }
        
        /* Sidebar */
        .sidebar { width: 90px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 25px; }
        .tool-btn { border: none; background: none; cursor: pointer; text-align: center; font-size: 11px; font-weight: 700; color: #666; width: 100%; transition: 0.2s; }
        .tool-icon { width: 48px; height: 48px; background: #f5f5f7; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-size: 18px; color: #111; }
        .tool-btn:hover .tool-icon { background: #111; color: #fff; transform: translateY(-2px); }
        
        .tool-btn.del-btn .tool-icon { color: var(--danger); border: 1px solid #ffebeb; }
        .tool-btn.del-btn:hover .tool-icon { background: var(--danger); color: #fff; border-color: var(--danger); }

        /* Canvas Area */
        .canvas-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 40px; }
        .artboard { width: 450px; height: 600px; background: white; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.12); border-radius: 4px; }
        
        /* Elements */
        .element { position: absolute; cursor: move; user-select: none; border: 2px solid transparent; box-sizing: content-box; }
        .element.selected { border: 2px solid var(--accent) !important; z-index: 100; }
        .text-el { min-width: 50px; font-size: 30px; font-weight: 900; white-space: nowrap; padding: 10px; outline: none; }
        .box-el { width: 120px; height: 120px; background: #111; }
        .circle-el { width: 120px; height: 120px; background: var(--accent); border-radius: 50%; }

        /* Top Control Bar */
        .editor-top-bar { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 12px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); z-index: 500; align-items: center; border: 1px solid rgba(0,0,0,0.05); }
        .editor-top-bar input { border: 1px solid #ddd; padding: 6px; border-radius: 6px; font-size: 13px; font-weight: 600; }

        /* ARCHIVE */
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 60px 8%; overflow-y: auto; height: calc(100vh - 150px); }
        .work-card { background: #fff; border: 1px solid var(--border); border-radius: 24px; padding: 25px; transition: 0.3s; }
        .preview-area { height: 220px; background: #f8f8f8; border-radius: 16px; margin-bottom: 20px; overflow: hidden; position: relative; border: 1px solid #eee; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="navTo('home-page')">LAGO</div>
        <nav>
            <ul>
                <li><a onclick="navTo('home-page')">Home</a></li>
                <li><a onclick="navTo('editor-page')">Studio</a></li>
                <li><a onclick="loadArchive()">Archive</a></li>
            </ul>
        </nav>
        <button class="btn-black" onclick="navTo('editor-page')">Launch Studio</button>
    </header>

    <div id="home-page" class="page active">
        <div style="text-align: center; padding-top: 15vh;">
            <h1 style="font-size: 6rem; font-weight: 950; letter-spacing: -5px; line-height: 1;">Beyond<br>The Frame.</h1>
            <p style="color: var(--text-sub); font-size: 1.4rem; margin: 30px 0 50px;">완벽한 조형미를 위한 미니멀 디자인 스튜디오</p>
            <button class="btn-black" style="padding: 18px 45px; border-radius: 40px; font-size: 1.1rem;" onclick="navTo('editor-page')">Start Designing</button>
        </div>
    </div>

    <div id="editor-page" class="page">
        <div class="editor-layout">
            <aside class="sidebar">
                <button class="tool-btn" onclick="addElement('text')"><div class="tool-icon">T</div>Text</button>
                <button class="tool-btn" onclick="addElement('box')"><div class="tool-icon">■</div>Box</button>
                <button class="tool-btn" onclick="addElement('circle')"><div class="tool-icon">●</div>Circle</button>
                <div style="flex: 1;"></div>
                <button class="tool-btn del-btn" onclick="deleteElement()">
                    <div class="tool-icon">✕</div>
                    Delete
                </button>
            </aside>

            <main class="canvas-container">
                <div class="editor-top-bar">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-size:11px; font-weight:800;">COLOR</span>
                        <input type="color" id="prop-color" oninput="updateElement('color', this.value)">
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-size:11px; font-weight:800;">SIZE</span>
                        <input type="number" id="prop-size" style="width: 60px;" oninput="updateElement('size', this.value)" onfocus="this.select()">
                    </div>
                    <button class="btn-black" style="padding: 8px 20px; font-size: 12px;" onclick="saveToArchive()">SAVE TO ARCHIVE</button>
                </div>

                <div class="artboard" id="artboard" onclick="deselectAll(event)">
                    <div class="element text-el" style="left: 100px; top: 250px;" onmousedown="startDrag(this, event)">START DESIGN</div>
                </div>
            </main>
        </div>
    </div>

    <div id="archive-page" class="page">
        <div style="padding: 50px 8% 0;">
            <h2 style="font-size: 3rem; font-weight: 900; letter-spacing: -2px;">Creative Archive</h2>
        </div>
        <div class="archive-grid" id="archive-grid"></div>
    </div>

    <script>
        let selectedEl = null;
        let isDragging = false;
        let offset = { x: 0, y: 0 };
        let archive = [];

        function navTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function addElement(type) {
            const artboard = document.getElementById('artboard');
            const el = document.createElement('div');
            el.className = `element ${type}-el`;
            
            if(type === 'text') {
                el.innerText = "NEW TEXT";
                el.contentEditable = true;
                el.style.fontSize = "30px";
            }

            el.style.left = "50px";
            el.style.top = "50px";
            
            el.addEventListener('mousedown', (e) => startDrag(el, e));
            artboard.appendChild(el);
            select(el);
        }

        function startDrag(el, e) {
            if(e.target.contentEditable === "true" && document.activeElement === e.target) return;
            
            e.stopPropagation();
            select(el);
            isDragging = true;
            
            offset = {
                x: e.clientX - el.offsetLeft,
                y: e.clientY - el.offsetTop
            };

            const moveHandler = (e) => {
                if (!isDragging) return;
                el.style.left = (e.clientX - offset.x) + 'px';
                el.style.top = (e.clientY - offset.y) + 'px';
            };

            const upHandler = () => {
                isDragging = false;
                document.removeEventListener('mousemove', moveHandler);
                document.removeEventListener('mouseup', upHandler);
            };

            document.addEventListener('mousemove', moveHandler);
            document.addEventListener('mouseup', upHandler);
        }

        function select(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el;
            selectedEl.classList.add('selected');

            const style = window.getComputedStyle(el);
            document.getElementById('prop-size').value = parseInt(style.fontSize) || parseInt(style.width);
        }

        function deselectAll(e) {
            if (e.target.id === 'artboard' && selectedEl) {
                selectedEl.classList.remove('selected');
                selectedEl = null;
            }
        }

        function updateElement(type, val) {
            if (!selectedEl) return;
            if (type === 'color') {
                if (selectedEl.classList.contains('text-el')) selectedEl.style.color = val;
                else selectedEl.style.backgroundColor = val;
            }
            if (type === 'size') {
                if (selectedEl.classList.contains('text-el')) selectedEl.style.fontSize = val + 'px';
                else {
                    selectedEl.style.width = val + 'px';
                    selectedEl.style.height = val + 'px';
                }
            }
        }

        // --- 수정된 삭제 로직 시작 ---
        function deleteElement() {
            if (selectedEl) {
                selectedEl.remove();
                selectedEl = null;
            } else {
                alert("삭제할 요소를 선택해주세요.");
            }
        }

        // 키보드 이벤트: 입력창에 포커스가 있을 때는 삭제를 방지함
        document.addEventListener('keydown', (e) => {
            if (!selectedEl) return;

            // 현재 커서가 입력창(INPUT)이나 글자 수정(contentEditable) 중인지 감지
            const isTyping = 
                e.target.tagName === 'INPUT' || 
                e.target.tagName === 'TEXTAREA' || 
                e.target.isContentEditable;

            // Delete나 Backspace를 눌렀을 때, 무언가 입력 중이 아닐 때만 요소 삭제
            if ((e.key === 'Delete' || e.key === 'Backspace') && !isTyping) {
                selectedEl.remove();
                selectedEl = null;
            }
        });
        // --- 수정된 삭제 로직 끝 ---

        function saveToArchive() {
            const artboard = document.getElementById('artboard');
            if (artboard.children.length === 0) return alert("저장할 요소가 없습니다.");
            
            archive.push({
                id: Date.now(),
                content: artboard.innerHTML,
                date: new Date().toLocaleString()
            });
            alert("디자인이 아카이브에 기록되었습니다.");
        }

        function loadArchive() {
            navTo('archive-page');
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';

            archive.forEach(item => {
                const card = document.createElement('div');
                card.className = 'work-card';
                card.innerHTML = `
                    <div class="preview-area">
                        <div style="transform: scale(0.4); transform-origin: top left; width: 250%; height: 250%; pointer-events: none;">
                            ${item.content}
                        </div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <p style="font-weight: 800; font-size: 14px;">PROJECT_${item.id.toString().slice(-4)}</p>
                            <p style="font-size: 12px; color: #aaa;">${item.date}</p>
                        </div>
                        <button class="btn-black" style="font-size:11px;" onclick="restoreProject('${item.id}')">LOAD</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function restoreProject(id) {
            const project = archive.find(a => a.id == id);
            const artboard = document.getElementById('artboard');
            artboard.innerHTML = project.content;
            
            Array.from(artboard.children).forEach(el => {
                el.addEventListener('mousedown', (e) => startDrag(el, e));
            });
            
            navTo('editor-page');
        }
    </script>
</body>
</html>
